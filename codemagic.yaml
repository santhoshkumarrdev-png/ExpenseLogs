workflows:
  android-workflow:
    name: Build ExpenseLog APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          cd ExpenseLogs/ExpenseLogs
          gradle assembleDebug
    artifacts:
      - ExpenseLogs/ExpenseLogs/app/build/outputs/**/*.apk
      
